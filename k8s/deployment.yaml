apiVersion: apps/v1
kind: Deployment
metadata:
  name: boxstore-api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: boxstore-api
  template:
    metadata:
      labels:
        app: boxstore-api
    spec:
      containers:
        - name: boxstore-api
          image: boxstore-api-image
          imagePullPolicy: Never
          ports:
            - containerPort: 8008
